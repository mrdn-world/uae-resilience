name: Build & Deploy

on:
  workflow_call:
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── Parse deploy.yml ──────────────────────────────────────────

      - name: Parse deploy config
        id: config
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f deploy.yml ]; then
            echo "::error::deploy.yml not found in repository root"
            exit 1
          fi

          BRANCH="${GITHUB_REF_NAME}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

          # Basic config
          BUILD_CMD=$(yq -r '.build' deploy.yml)
          OUTPUT_DIR=$(yq -r '.output' deploy.yml)
          REPO_NAME="${GITHUB_REPOSITORY#*/}"

          echo "build-command=${BUILD_CMD}" >> "$GITHUB_OUTPUT"
          echo "output-dir=${OUTPUT_DIR}" >> "$GITHUB_OUTPUT"

          # ── Determine mode: deploy / build-only / skip ──

          # Support both string and object format:
          #   main: my-project                    (string)
          #   dev:
          #     target: staging-my-project        (object)
          #     protected: true | team | false
          TARGET=$(yq -r ".environments.\"${BRANCH}\".target // \"\"" deploy.yml 2>/dev/null)
          if [ -n "$TARGET" ]; then
            PROTECTED=$(yq -r ".environments.\"${BRANCH}\".protected // \"false\"" deploy.yml)
            NOINDEX=$(yq -r ".environments.\"${BRANCH}\".noindex // \"false\"" deploy.yml)
          else
            TARGET=$(yq -r ".environments.\"${BRANCH}\" // \"\"" deploy.yml)
            PROTECTED="false"
            NOINDEX="false"
          fi
          # Normalize: true → "true", team → "team", everything else → "false"
          case "$PROTECTED" in
            true|True|TRUE) PROTECTED="true" ;;
            team|Team|TEAM) PROTECTED="team" ;;
            *) PROTECTED="false" ;;
          esac

          if [ -n "$TARGET" ]; then
            echo "mode=deploy" >> "$GITHUB_OUTPUT"
            echo "target=${TARGET}" >> "$GITHUB_OUTPUT"
            echo "protected=${PROTECTED}" >> "$GITHUB_OUTPUT"
            echo "noindex=${NOINDEX}" >> "$GITHUB_OUTPUT"

            # Parse target format:
            #   "my-project"       → type=subdomain
            #   "/project-a"       → type=path (root domain)
            #   "app/module-a"     → type=path (subdomain + path)
            #   "@"                → type=root

            if [ "$TARGET" = "@" ]; then
              echo "deploy-type=root" >> "$GITHUB_OUTPUT"
              echo "deploy-path=" >> "$GITHUB_OUTPUT"
              echo "deploy-subdomain=" >> "$GITHUB_OUTPUT"
              PAGES_PROJECT=$(echo "$REPO_NAME" | sed 's/[^a-zA-Z0-9-]/-/g')

            elif [[ "$TARGET" == /* ]]; then
              # Starts with / → path on root domain
              echo "deploy-type=path" >> "$GITHUB_OUTPUT"
              echo "deploy-path=${TARGET}" >> "$GITHUB_OUTPUT"
              echo "deploy-subdomain=" >> "$GITHUB_OUTPUT"
              PAGES_PROJECT=$(echo "${TARGET#/}" | sed 's/[^a-zA-Z0-9-]/-/g')

            elif [[ "$TARGET" == */* ]]; then
              # Contains / → subdomain + path
              SUBDOMAIN_PART="${TARGET%%/*}"
              PATH_PART="/${TARGET#*/}"
              echo "deploy-type=path" >> "$GITHUB_OUTPUT"
              echo "deploy-path=${PATH_PART}" >> "$GITHUB_OUTPUT"
              echo "deploy-subdomain=${SUBDOMAIN_PART}" >> "$GITHUB_OUTPUT"
              PAGES_PROJECT=$(echo "$TARGET" | sed 's/[^a-zA-Z0-9-]/-/g')

            else
              # Plain subdomain
              echo "deploy-type=subdomain" >> "$GITHUB_OUTPUT"
              echo "deploy-path=" >> "$GITHUB_OUTPUT"
              echo "deploy-subdomain=${TARGET}" >> "$GITHUB_OUTPUT"
              PAGES_PROJECT=$(echo "$TARGET" | sed 's/[^a-zA-Z0-9-]/-/g')
            fi

            echo "pages-project=${PAGES_PROJECT}" >> "$GITHUB_OUTPUT"
            echo "::notice::Branch '${BRANCH}' -> deploy as '${TARGET}' (${PAGES_PROJECT})"
          else
            MATCH=false
            MATCHED_PATTERN=""
            while IFS= read -r pattern; do
              [ -z "$pattern" ] && continue
              if [[ "$BRANCH" == $pattern ]]; then
                MATCH=true
                MATCHED_PATTERN="$pattern"
                break
              fi
            done < <(yq -r '.build-only[]? // empty' deploy.yml 2>/dev/null)

            if [ "$MATCH" = true ]; then
              echo "mode=build-only" >> "$GITHUB_OUTPUT"
              echo "::notice::Branch '${BRANCH}' -> build only (matched '${MATCHED_PATTERN}')"
            else
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              echo "::notice::Branch '${BRANCH}' -> skip (not configured)"
            fi
          fi

          # ── Node.js version: deploy.yml > .nvmrc > .node-version > 22 ──

          NODE_VER=$(yq -r '.node-version // ""' deploy.yml)
          if [ -z "$NODE_VER" ]; then
            if [ -f .nvmrc ]; then
              NODE_VER=$(tr -d '[:space:]' < .nvmrc)
            elif [ -f .node-version ]; then
              NODE_VER=$(tr -d '[:space:]' < .node-version)
            else
              NODE_VER="22"
            fi
          fi
          echo "node-version=${NODE_VER}" >> "$GITHUB_OUTPUT"

          # ── Package manager: deploy.yml > lock file > npm ──

          if [ ! -f package.json ]; then
            echo "pm=" >> "$GITHUB_OUTPUT"
            echo "install-command=" >> "$GITHUB_OUTPUT"
            echo "has-deps=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-deps=true" >> "$GITHUB_OUTPUT"
            CUSTOM_INSTALL=$(yq -r '.install // ""' deploy.yml)
            if [ -n "$CUSTOM_INSTALL" ]; then
              echo "install-command=${CUSTOM_INSTALL}" >> "$GITHUB_OUTPUT"
              case "$CUSTOM_INSTALL" in
                pnpm*) echo "pm=pnpm" ;;
                yarn*) echo "pm=yarn" ;;
                bun*)  echo "pm=bun"  ;;
                *)     echo "pm=npm"  ;;
              esac >> "$GITHUB_OUTPUT"
            elif [ -f pnpm-lock.yaml ]; then
              echo "pm=pnpm" >> "$GITHUB_OUTPUT"
              echo "install-command=pnpm install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            elif [ -f yarn.lock ]; then
              echo "pm=yarn" >> "$GITHUB_OUTPUT"
              echo "install-command=yarn install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            elif [ -f bun.lockb ] || [ -f bun.lock ]; then
              echo "pm=bun" >> "$GITHUB_OUTPUT"
              echo "install-command=bun install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            elif [ -f package-lock.json ]; then
              echo "pm=npm" >> "$GITHUB_OUTPUT"
              echo "install-command=npm ci" >> "$GITHUB_OUTPUT"
            else
              echo "pm=npm" >> "$GITHUB_OUTPUT"
              echo "install-command=npm install" >> "$GITHUB_OUTPUT"
            fi
          fi

      # ── Setup tools ───────────────────────────────────────────────

      - name: Setup pnpm
        if: steps.config.outputs.mode != 'skip' && steps.config.outputs.pm == 'pnpm'
        uses: pnpm/action-setup@v4

      - name: Setup Bun
        if: steps.config.outputs.mode != 'skip' && steps.config.outputs.pm == 'bun'
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        if: steps.config.outputs.mode != 'skip'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.config.outputs.node-version }}

      # ── Build ─────────────────────────────────────────────────────

      - name: Install dependencies
        if: steps.config.outputs.mode != 'skip' && steps.config.outputs.has-deps == 'true'
        run: ${{ steps.config.outputs.install-command }}

      - name: Build
        if: steps.config.outputs.mode != 'skip'
        env:
          BASE_PATH: ${{ steps.config.outputs.deploy-path }}
        run: ${{ steps.config.outputs.build-command }}

      - name: Generate robots.txt
        if: steps.config.outputs.mode != 'skip' && steps.config.outputs.noindex == 'true'
        run: |
          printf "User-agent: *\nDisallow: /\n" > "${{ steps.config.outputs.output-dir }}/robots.txt"
          echo "::notice::robots.txt generated (noindex: true)"

      # ── Registry check ─────────────────────────────────────────────

      - name: Check and update registry
        id: registry
        if: steps.config.outputs.mode == 'deploy'
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        shell: bash
        run: |
          PAGES_PROJECT="${{ steps.config.outputs.pages-project }}"
          CURRENT_REPO="${{ github.repository }}"

          if [ -z "$REGISTRY_TOKEN" ]; then
            echo "::notice::Registry check skipped (REGISTRY_TOKEN not set)"
            exit 0
          fi

          # Fetch registry.json
          RESPONSE=$(curl -sf \
            "https://api.github.com/repos/mrdn-world/.github/contents/registry.json" \
            -H "Authorization: token ${REGISTRY_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" 2>/dev/null || echo '{}')

          if echo "$RESPONSE" | jq -e '.content' > /dev/null 2>&1; then
            REGISTRY=$(echo "$RESPONSE" | jq -r '.content' | base64 -d)
            FILE_SHA=$(echo "$RESPONSE" | jq -r '.sha')
          else
            REGISTRY='{}'
            FILE_SHA=""
          fi

          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "file-sha=${FILE_SHA}" >> "$GITHUB_OUTPUT"

          # Check for conflicts — handle both old (string) and new (object) format
          EXISTING=$(echo "$REGISTRY" | jq -r ".\"${PAGES_PROJECT}\"")
          if [ "$EXISTING" != "null" ]; then
            # Old format: value is a string (repo name)
            # New format: value is an object with .repo field
            OWNER=$(echo "$REGISTRY" | jq -r "if .\"${PAGES_PROJECT}\" | type == \"string\" then .\"${PAGES_PROJECT}\" else .\"${PAGES_PROJECT}\".repo end")
            if [ -n "$OWNER" ] && [ "$OWNER" != "null" ] && [ "$OWNER" != "$CURRENT_REPO" ]; then
              echo "::error::Target '${PAGES_PROJECT}' is already used by ${OWNER}"
              exit 1
            fi
          fi

          echo "::notice::Registry check passed for '${PAGES_PROJECT}'"

      # ── Deploy ────────────────────────────────────────────────────

      - name: Create Pages project
        if: steps.config.outputs.mode == 'deploy'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@latest pages project create \
            "${{ steps.config.outputs.pages-project }}" \
            --production-branch=main 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        if: steps.config.outputs.mode == 'deploy'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@latest pages deploy \
            "${{ steps.config.outputs.output-dir }}" \
            --project-name="${{ steps.config.outputs.pages-project }}" \
            --branch=main

      # ── Configure domain/DNS (subdomain and root only) ────────────

      - name: Configure custom domain and DNS
        if: steps.config.outputs.mode == 'deploy' && steps.config.outputs.deploy-type != 'path' && vars.DEPLOY_DOMAIN != ''
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          TARGET="${{ steps.config.outputs.target }}"
          PAGES_PROJECT="${{ steps.config.outputs.pages-project }}"
          BASE_DOMAIN="${{ vars.DEPLOY_DOMAIN }}"

          # Get pages.dev hostname
          PROJECT_INFO=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/pages/projects/${PAGES_PROJECT}" \
            -H "Authorization: Bearer ${CF_TOKEN}")
          PAGES_HOST=$(echo "$PROJECT_INFO" | jq -r '.result.subdomain')

          if [ -z "$PAGES_HOST" ] || [ "$PAGES_HOST" = "null" ]; then
            echo "::warning::Could not determine pages.dev hostname"
            exit 0
          fi
          echo "::notice::Pages host: ${PAGES_HOST}"

          if [ "$TARGET" = "@" ]; then
            DOMAIN="$BASE_DOMAIN"
            DNS_NAME="@"
          else
            DOMAIN="${TARGET}.${BASE_DOMAIN}"
            DNS_NAME="${TARGET}"
          fi

          # Add custom domain to Pages project
          EXISTING=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/pages/projects/${PAGES_PROJECT}/domains" \
            -H "Authorization: Bearer ${CF_TOKEN}" || echo '{"result":[]}')

          if echo "$EXISTING" | jq -e ".result[] | select(.name == \"${DOMAIN}\")" > /dev/null 2>&1; then
            echo "::notice::Pages domain ${DOMAIN} already configured"
          else
            echo "Adding Pages domain ${DOMAIN}..."
            curl -sf -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/pages/projects/${PAGES_PROJECT}/domains" \
              -H "Authorization: Bearer ${CF_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\": \"${DOMAIN}\"}" > /dev/null
          fi

          # Create CNAME DNS record if missing
          ZONE_ID=$(curl -sf \
            "https://api.cloudflare.com/client/v4/zones?name=${BASE_DOMAIN}" \
            -H "Authorization: Bearer ${CF_TOKEN}" | jq -r '.result[0].id')

          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "null" ]; then
            echo "::warning::Could not find zone ID for ${BASE_DOMAIN}"
            exit 0
          fi

          EXISTING_DNS=$(curl -sf \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?type=CNAME&name=${DOMAIN}" \
            -H "Authorization: Bearer ${CF_TOKEN}")

          RECORD_COUNT=$(echo "$EXISTING_DNS" | jq '.result | length')

          if [ "$RECORD_COUNT" -gt 0 ]; then
            echo "::notice::DNS CNAME for ${DOMAIN} already exists"
          else
            echo "Creating CNAME: ${DOMAIN} -> ${PAGES_HOST}..."
            RESULT=$(curl -sf -X POST \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${CF_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"type\": \"CNAME\",
                \"name\": \"${DNS_NAME}\",
                \"content\": \"${PAGES_HOST}\",
                \"proxied\": true
              }")

            if echo "$RESULT" | jq -e '.success' > /dev/null 2>&1; then
              echo "::notice::DNS CNAME ${DOMAIN} -> ${PAGES_HOST} created"
            else
              echo "::warning::Failed to create DNS record"
              echo "$RESULT" | jq '.errors' 2>/dev/null || echo "$RESULT"
            fi
          fi

      # ── Update registry ────────────────────────────────────────────

      - name: Update registry
        if: steps.config.outputs.mode == 'deploy'
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          if [ -z "$REGISTRY_TOKEN" ]; then exit 0; fi

          PAGES_PROJECT="${{ steps.config.outputs.pages-project }}"
          CURRENT_REPO="${{ github.repository }}"
          DEPLOY_TYPE="${{ steps.config.outputs.deploy-type }}"
          DEPLOY_PATH="${{ steps.config.outputs.deploy-path }}"

          # Get pages.dev hostname
          PROJECT_INFO=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/pages/projects/${PAGES_PROJECT}" \
            -H "Authorization: Bearer ${CF_TOKEN}")
          PAGES_HOST=$(echo "$PROJECT_INFO" | jq -r '.result.subdomain')

          # Fetch latest registry
          RESPONSE=$(curl -sf \
            "https://api.github.com/repos/mrdn-world/.github/contents/registry.json" \
            -H "Authorization: token ${REGISTRY_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" 2>/dev/null || echo '{}')

          if echo "$RESPONSE" | jq -e '.content' > /dev/null 2>&1; then
            REGISTRY=$(echo "$RESPONSE" | jq -r '.content' | base64 -d)
            FILE_SHA=$(echo "$RESPONSE" | jq -r '.sha')
          else
            REGISTRY='{}'
            FILE_SHA=""
          fi

          # Build entry
          ENTRY=$(jq -n \
            --arg repo "$CURRENT_REPO" \
            --arg type "$DEPLOY_TYPE" \
            --arg path "$DEPLOY_PATH" \
            --arg pages_host "$PAGES_HOST" \
            '{repo: $repo, type: $type, path: $path, pages_host: $pages_host}')

          # Update registry
          NEW_REGISTRY=$(echo "$REGISTRY" | jq -c ". + {\"${PAGES_PROJECT}\": ${ENTRY}}")
          ENCODED=$(echo "$NEW_REGISTRY" | base64 -w0)

          UPDATE_BODY="{\"message\":\"Update ${PAGES_PROJECT} (${DEPLOY_TYPE})\",\"content\":\"${ENCODED}\""
          if [ -n "$FILE_SHA" ]; then
            UPDATE_BODY="${UPDATE_BODY},\"sha\":\"${FILE_SHA}\""
          fi
          UPDATE_BODY="${UPDATE_BODY}}"

          curl -sf -X PUT \
            "https://api.github.com/repos/mrdn-world/.github/contents/registry.json" \
            -H "Authorization: token ${REGISTRY_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d "$UPDATE_BODY" > /dev/null

          echo "::notice::Registry updated: ${PAGES_PROJECT} (${DEPLOY_TYPE})"

      # ── Cloudflare Access (protected environments) ─────────────────

      - name: Configure Access protection
        if: steps.config.outputs.mode == 'deploy' && steps.config.outputs.protected != 'false' && steps.config.outputs.protected != '' && vars.DEPLOY_DOMAIN != ''
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        shell: bash
        run: |
          TARGET="${{ steps.config.outputs.target }}"
          DEPLOY_TYPE="${{ steps.config.outputs.deploy-type }}"
          PAGES_PROJECT="${{ steps.config.outputs.pages-project }}"
          BASE_DOMAIN="${{ vars.DEPLOY_DOMAIN }}"
          ACCESS_DOMAIN="${{ vars.ACCESS_DOMAIN }}"

          # Determine what domain/path to protect
          if [ "$DEPLOY_TYPE" = "root" ]; then
            APP_DOMAIN="${BASE_DOMAIN}"
            APP_PATH=""
          elif [ "$DEPLOY_TYPE" = "path" ]; then
            SUBDOMAIN="${{ steps.config.outputs.deploy-subdomain }}"
            DEPLOY_PATH="${{ steps.config.outputs.deploy-path }}"
            if [ -n "$SUBDOMAIN" ]; then
              APP_DOMAIN="${SUBDOMAIN}.${BASE_DOMAIN}"
            else
              APP_DOMAIN="${BASE_DOMAIN}"
            fi
            APP_PATH="${DEPLOY_PATH}"
          else
            APP_DOMAIN="${TARGET}.${BASE_DOMAIN}"
            APP_PATH=""
          fi

          APP_NAME="deploy-${PAGES_PROJECT}"

          PROTECTED="${{ steps.config.outputs.protected }}"

          # Find reusable policies
          POLICIES=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/access/policies" \
            -H "Authorization: Bearer ${CF_TOKEN}")

          TEAM_POLICY_ID=$(echo "$POLICIES" | jq -r '[.result[] | select(.name | test("team access"; "i"))][0].id' 2>/dev/null)

          if [ -z "$TEAM_POLICY_ID" ] || [ "$TEAM_POLICY_ID" = "null" ]; then
            echo "::warning::Reusable policy 'Team access' not found. Create it manually."
            exit 0
          fi

          # Build policies array
          POLICIES_JSON="[{\"id\": \"${TEAM_POLICY_ID}\", \"precedence\": 1}"

          if [ "$PROTECTED" = "true" ]; then
            # true = team + public request
            PUBLIC_POLICY_ID=$(echo "$POLICIES" | jq -r '[.result[] | select(.name | test("public request"; "i"))][0].id' 2>/dev/null)
            if [ -n "$PUBLIC_POLICY_ID" ] && [ "$PUBLIC_POLICY_ID" != "null" ]; then
              POLICIES_JSON="${POLICIES_JSON}, {\"id\": \"${PUBLIC_POLICY_ID}\", \"precedence\": 2}"
            else
              echo "::warning::Reusable policy 'Public request' not found. Only 'Team access' will be applied."
            fi
          fi
          # team = only team access (no public request)
          POLICIES_JSON="${POLICIES_JSON}]"

          # Check if Access Application already exists
          APPS=$(curl -sf \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/access/apps" \
            -H "Authorization: Bearer ${CF_TOKEN}")

          EXISTING_APP_ID=$(echo "$APPS" | jq -r ".result[] | select(.name == \"${APP_NAME}\") | .id" 2>/dev/null)

          if [ -n "$EXISTING_APP_ID" ] && [ "$EXISTING_APP_ID" != "null" ]; then
            echo "::notice::Access application '${APP_NAME}' already exists (${EXISTING_APP_ID})"
            exit 0
          fi

          # Create Access Application
          # For path-based apps, include path in domain field
          if [ -n "$APP_PATH" ]; then
            CLEAN_PATH="${APP_PATH#/}"
            FULL_DOMAIN="${APP_DOMAIN}/${CLEAN_PATH}"
          else
            FULL_DOMAIN="${APP_DOMAIN}"
          fi

          APP_BODY="{
            \"name\": \"${APP_NAME}\",
            \"domain\": \"${FULL_DOMAIN}\",
            \"type\": \"self_hosted\",
            \"session_duration\": \"24h\",
            \"policies\": ${POLICIES_JSON}
          }"

          APP_RESULT=$(curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/access/apps" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$APP_BODY")

          APP_ID=$(echo "$APP_RESULT" | jq -r '.result.id')

          if [ -z "$APP_ID" ] || [ "$APP_ID" = "null" ]; then
            echo "::warning::Failed to create Access application"
            echo "$APP_RESULT" | jq '.errors' 2>/dev/null || echo "$APP_RESULT"
            exit 0
          fi

          if [ "$PROTECTED" = "true" ]; then
            echo "::notice::Access '${APP_NAME}' created (Team access + Public request)"
          else
            echo "::notice::Access '${APP_NAME}' created (Team access only)"
          fi
